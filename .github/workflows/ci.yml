name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Routelo iOS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: routelo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: routelo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Typecheck
        run: npm run typecheck

      - name: Verify ML Kit exclusion
        run: npm run verify:no-mlkit

      - name: Verify OCR models
        run: npm run verify:ocr-models

<!doctype html>
<html><head><meta charset="utf-8"><style>html,body{margin:0;padding:0}</style></head>
<body>
<div id="root"></div>
<script>
const cx=512, cy=515, R=292;
const D=Math.PI/180;

function leaf(x,y,rot,s,fill,vein){
  return `<g transform="translate(${x},${y}) rotate(${rot}) scale(${s})">
    <path d="M0 0 C 16 -22 16 -60 0 -88 C -16 -60 -16 -22 0 0 Z" fill="${fill}"/>
    <path d="M0 -8 L0 -78" stroke="${vein}" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  </g>`;
}
function bloom(x,y,s){
  let p='';for(let i=0;i<5;i++){const a=i*72;p+=`<ellipse cx="0" cy="-12" rx="9" ry="14" fill="#FCF8EE" stroke="#E6D6AC" stroke-width="1" transform="rotate(${a})"/>`;}
  return `<g transform="translate(${x},${y}) scale(${s})">${p}<circle r="6" fill="#CFA53C"/></g>`;
}
function berry(x,y,s){return `<g transform="translate(${x},${y}) scale(${s})"><circle r="4.5" fill="#C9A24E"/></g>`;}

let leaves='', accents='';
const N=46;
for(let k=0;k<N;k++){
  const a=k*(360/N), rad=a*D, tan=a+90;
  const dark=k%2===0;
  const fill=dark?'#5E7E59':'#7E9A77', vein=dark?'#46604A':'#5A7654';
  const ox=cx+R*Math.cos(rad), oy=cy+R*Math.sin(rad);
  // 모두 같은 회전 방향으로 눕혀 라우렐 흐름을 만든다(깃털 두 장)
  leaves+=leaf(ox,oy,tan+46,0.98,fill,vein);
  leaves+=leaf(ox,oy,tan+18,0.78,dark?'#7E9A77':'#6C8C66',vein);
  // 링을 껴안는 안쪽 채움 줄
  const ix=cx+(R-32)*Math.cos(rad), iy=cy+(R-32)*Math.sin(rad);
  leaves+=leaf(ix,iy,tan+52,0.6,'#8AA682',vein);
}
// 꽃 6송이 + 작은 골드 열매쌍
[30,90,150,210,270,330].forEach((a,idx)=>{
  const rad=a*D, x=cx+R*Math.cos(rad), y=cy+R*Math.sin(rad);
  accents+=bloom(x,y,1.05+(idx%3)*0.14);
  const t=(a+90)*D;
  accents+=berry(x+22*Math.cos(t),y+22*Math.sin(t),0.9)+berry(x-20*Math.cos(t),y-20*Math.sin(t),0.75);
});

const root=`
<g filter="url(#gsh)">
  <path d="M 400 505 C 420 489 436 496 446 526 L 478 612 C 486 630 502 628 510 606 L 590 386 C 598 364 620 358 650 366"
        fill="none" stroke="url(#gold)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 636 364 C 672 358 692 370 698 350"
        fill="none" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>
  <path d="M 482 604 L 544 432" fill="none" stroke="#FBE9BC" stroke-opacity="0.5" stroke-width="6" stroke-linecap="round"/>
</g>`;

const svg=`
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
 <defs>
   <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
     <stop offset="0" stop-color="#FBF8F0"/><stop offset="1" stop-color="#EFE7D5"/>
   </linearGradient>
   <radialGradient id="vig" cx="0.5" cy="0.5" r="0.62">
     <stop offset="0.7" stop-color="#ffffff" stop-opacity="0"/><stop offset="1" stop-color="#D8CBB0" stop-opacity="0.35"/>
   </radialGradient>
   <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
     <stop offset="0" stop-color="#BE8E2E"/><stop offset="0.45" stop-color="#EBCE82"/>
     <stop offset="0.7" stop-color="#C79A38"/><stop offset="1" stop-color="#A87C24"/>
   </linearGradient>
   <filter id="gsh" x="-30%" y="-30%" width="160%" height="160%">
     <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#7A5A1E" flood-opacity="0.26"/>
   </filter>
 </defs>
 <rect width="1024" height="1024" fill="url(#bg)"/>
 <rect width="1024" height="1024" fill="url(#vig)"/>
 <g>${leaves}</g>
 <g>${accents}</g>
 ${root}
</svg>`;
document.getElementById('root').innerHTML=svg;
</script>
</body></html>
